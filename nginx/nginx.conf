server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy ─────────────────────────────────────────────
    # Frontend calls /api/auth/login → strip /api → backend gets /auth/login
    location /api/ {
        proxy_pass         http://flowdesk-api:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 25M;
    }

    # ── Media files ───────────────────────────────────────────
    # PDF templates, attachments, signatures, generated documents
    location /media/ {
        proxy_pass         http://flowdesk-api:8000/media/;
        proxy_set_header   Host $host;
    }

    # ── Swagger docs (optional, dev/staging only) ─────────────
    location /docs {
        proxy_pass         http://flowdesk-api:8000/docs;
        proxy_set_header   Host $host;
    }
    location /openapi.json {
        proxy_pass         http://flowdesk-api:8000/openapi.json;
        proxy_set_header   Host $host;
    }

    # ── Frontend SPA ──────────────────────────────────────────
    # All other routes serve index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Caching for static assets ─────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
