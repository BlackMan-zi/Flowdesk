# FlowDesk — Production Docker Compose
# Deployed at /opt/flowdesk on the BSC server (10.20.26.47)
# Accessible at http://flowdesk.bsc.local  (vhost routing via outer proxy)

services:

  # ── PostgreSQL Database ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: flowdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # No ports exposed — only reachable by other containers on bsc_network
    expose:
      - "5432"
    volumes:
      - flowdesk_pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build: ./backend
    container_name: flowdesk-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - flowdesk_media:/app/media

  # ── Nginx + Frontend ────────────────────────────────────────
  # Multi-stage build: compiles React frontend, serves via nginx
  # Also proxies /api/ and /media/ to the backend
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: flowdesk-nginx
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

volumes:
  flowdesk_pgdata:
  flowdesk_media:

# All containers join bsc_network so the outer proxy can reach them
networks:
  default:
    name: bsc_network
    external: true
