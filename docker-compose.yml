services:

  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: flowdesk_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: FlowDesk_Root@2024
      MYSQL_DATABASE: flowdesk
      MYSQL_USER: flowdesk_app
      MYSQL_PASSWORD: FlowDesk_App@2024
    ports:
      - "3308:3306"          # host:container  (use 3308 to avoid conflicts with local MySQL)
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d   # runs *.sql on first start
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uflowdesk_app", "-pFlowDesk_App@2024"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build: .
    container_name: flowdesk_api
    restart: unless-stopped
    ports:
      - "9000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the Docker service name
      DATABASE_URL: mysql+pymysql://flowdesk_app:FlowDesk_App@2024@db:3306/flowdesk
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
  media_data:
